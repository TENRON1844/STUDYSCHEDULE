<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner</title>

    :root{
      --bg:#0a0f1f;
      --bg2:#121a35;
      --card:rgba(255,255,255,0.08);
      --card-border:rgba(255,255,255,0.14);
      --text:#eef2ff;
      --muted:#b8c2e3;
      --accent:#a78bfa;
      --accent2:#34d399;
      --accent3:#f59e0b;
      --danger:#ef4444;
      --shadow:0 20px 50px rgba(0,0,0,.28);

      --status-not-bg: rgba(239, 68, 68, 0.14);
      --status-not-border: rgba(239, 68, 68, 0.4);
      --status-not-text: #fecaca;

      --status-progress-bg: rgba(245, 158, 11, 0.16);
      --status-progress-border: rgba(245, 158, 11, 0.42);
      --status-progress-text: #fde68a;

      --status-complete-bg: rgba(52, 211, 153, 0.16);
      --status-complete-border: rgba(52, 211, 153, 0.42);
      --status-complete-text: #bbf7d0;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(167,139,250,.25), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(52,211,153,.18), transparent 25%),
        radial-gradient(circle at 75% 80%, rgba(245,158,11,.18), transparent 25%),
        linear-gradient(155deg, var(--bg), var(--bg2));
      min-height:100vh;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:28px;
    }

    .glass{
      background:var(--card);
      border:1px solid var(--card-border);
      box-shadow:var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .hero{
      border-radius:30px;
      padding:28px;
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:20px;
      margin-bottom:20px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(2rem, 4vw, 3.5rem);
      line-height:1;
      letter-spacing:-0.04em;
    }

    .sub{
      color:var(--muted);
      max-width:60ch;
      line-height:1.6;
      margin:0;
    }

    .eyebrow{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#ddd6fe;
      font-size:.82rem;
      font-weight:700;
      margin-bottom:14px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      align-content:start;
    }

    .stat{
      border-radius:20px;
      padding:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
    }

    .stat span{
      display:block;
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:8px;
    }

    .stat strong{
      font-size:1.8rem;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .countdown{
      background:linear-gradient(135deg, rgba(167,139,250,.18), rgba(52,211,153,.12));
    }

    .count-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:10px;
    }

    .count-box{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:12px;
      text-align:center;
    }

    .count-box b{
      display:block;
      font-size:1.5rem;
      margin-bottom:4px;
    }

    .progress-panel{
      border-radius:20px;
      padding:18px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.1);
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .progress-title{
      font-size:1rem;
      font-weight:700;
    }

    .progress-meta{
      color:var(--muted);
      font-weight:700;
    }

    .progress-track{
      width:100%;
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      overflow:hidden;
      position:relative;
    }

    .progress-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, #34d399, #a78bfa);
      transition:width .25s ease;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto auto auto;
      gap:12px;
      padding:16px;
      border-radius:22px;
      margin-bottom:20px;
      align-items:center;
    }

    select, button{
      width:100%;
      border:none;
      outline:none;
      border-radius:14px;
      padding:12px 14px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      font:inherit;
    }

    button{
      cursor:pointer;
      font-weight:700;
      transition:.18s ease;
    }

    button:hover{transform:translateY(-1px)}
    .btn-soft{background:rgba(255,255,255,.08)}
    .btn-danger{background:linear-gradient(135deg, #ef4444, #dc2626)}

    .board{
      display:grid;
      gap:16px;
    }

    .week{
      border-radius:26px;
      padding:18px;
    }

    .week-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .week-title{
      font-size:1.35rem;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .week-meta{
      color:var(--muted);
      font-size:.92rem;
    }

    .days{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:14px;
    }

    .day{
      border-radius:22px;
      padding:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
    }

    .day h3{
      margin:0 0 4px;
      font-size:1.1rem;
    }

    .day small{
      color:var(--muted);
    }

    .task{
      margin-top:12px;
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.09);
      transition:.2s ease;
    }

    .task.not-started{
      background:var(--status-not-bg);
      border-color:var(--status-not-border);
      box-shadow: inset 0 0 0 1px rgba(239,68,68,.08);
    }

    .task.in-progress{
      background:var(--status-progress-bg);
      border-color:var(--status-progress-border);
      box-shadow: inset 0 0 0 1px rgba(245,158,11,.08);
    }

    .task.complete{
      background:var(--status-complete-bg);
      border-color:var(--status-complete-border);
      box-shadow: inset 0 0 0 1px rgba(52,211,153,.08);
      opacity:.9;
    }

    .task.complete .task-title{
      text-decoration:line-through;
      text-decoration-thickness:2px;
    }

    .task-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:start;
      margin-bottom:10px;
    }

    .subject{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:.84rem;
      color:#fff;
      font-weight:700;
      padding:7px 10px;
      border-radius:999px;
      white-space:nowrap;
    }

    .bio{background:rgba(52,211,153,.16); color:#bbf7d0}
    .bus{background:rgba(245,158,11,.16); color:#fde68a}
    .geo{background:rgba(96,165,250,.16); color:#bfdbfe}
    .math{background:rgba(167,139,250,.16); color:#ddd6fe}
    .free{background:rgba(148,163,184,.16); color:#e2e8f0}

    .task-title{
      font-weight:700;
      line-height:1.4;
      margin-bottom:10px;
      cursor:text;
    }

    .task-title[contenteditable="true"]:focus{
      outline:2px solid rgba(167,139,250,.45);
      border-radius:8px;
      padding:2px 4px;
    }

    .note{
      margin-top:8px;
      color:var(--muted);
      font-size:.82rem;
      min-height:18px;
      cursor:text;
    }

    .note[contenteditable="true"]:focus{
      outline:2px solid rgba(52,211,153,.35);
      border-radius:8px;
      padding:2px 4px;
    }

    .status{
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      font-size:.84rem;
      font-weight:800;
      color:var(--text);
    }

    .status.not-started{
      background:rgba(239,68,68,.18);
      border-color:rgba(239,68,68,.45);
      color:var(--status-not-text);
    }

    .status.in-progress{
      background:rgba(245,158,11,.2);
      border-color:rgba(245,158,11,.45);
      color:var(--status-progress-text);
    }

    .status.complete{
      background:rgba(52,211,153,.2);
      border-color:rgba(52,211,153,.45);
      color:var(--status-complete-text);
    }

    .footer{
      margin:20px 0 8px;
      text-align:center;
      color:var(--muted);
      font-size:.88rem;
    }

    @media (max-width: 980px){
      .hero{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr 1fr}
    }

    @media (max-width: 640px){
      .wrap{padding:16px}
      .toolbar{grid-template-columns:1fr}
      .count-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

        <div class="stat countdown">

            <div class="count-box"><b id="minutes">0</b><span>Minutes</span></div>
            <div class="count-box"><b id="seconds">0</b><span>Seconds</span></div>
          </div>
        </div>

        <div class="progress-panel">
          <div class="progress-head">
            <div class="progress-title">Overall completion</div>
            <div class="progress-meta" id="progressCount">0 / 0 tasks complete</div>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="toolbar glass">
      <select id="weekFilter">
        <option value="all">All weeks</option>
      </select>

      <select id="subjectFilter">
        <option value="all">All subjects</option>
        <option value="Biology">Biology</option>
        <option value="Business">Business</option>
        <option value="Geography">Geography</option>
        <option value="Math">Math</option>
        <option value="Free">Free / No Math</option>
      </select>

      <select id="statusFilter">
        <option value="all">All statuses</option>
        <option value="not-started">Not started</option>
        <option value="in-progress">In progress</option>
        <option value="complete">Complete</option>
      </select>

      <button class="btn-soft" id="expandAll">Show all</button>
      <button class="btn-soft" id="exportData">Export progress</button>
      <button class="btn-danger" id="resetData">Reset</button>
    </section>

    <section id="board" class="board"></section>

    <p class="footer">Saved automatically in your browser.</p>
  </div>

        ]},
        { day: 28, tasks: [
          { subject: "Biology", title: "D2.1 Cell and nuclear division", status: "not-started", note: "" },
          { subject: "Business", title: "International marketing", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography mixed review: weakest unit", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
      ]},
      { week: 5, days: [

          { subject: "Biology", title: "D2.3 Water potential", status: "not-started", note: "" },
          { subject: "Business", title: "Introduction to operations management + operations methods", status: "not-started", note: "" },

          { subject: "Business", title: "Lean production and quality management + location", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography mixed review: strongest unit", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
        { day: 31, tasks: [
          { subject: "Biology", title: "D3.2 Inheritance", status: "not-started", note: "" },
          { subject: "Business", title: "Break-even analysis + production planning", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography mixed review: second strongest unit", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
        { day: 32, tasks: [
          { subject: "Biology", title: "D3.3 Homeostasis", status: "not-started", note: "" },
          { subject: "Business", title: "Crisis management and contingency planning + R&D", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography mixed review: human geography focus", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
        { day: 33, tasks: [
          { subject: "Biology", title: "D4.1 Natural selection", status: "not-started", note: "" },
          { subject: "Business", title: "Management information systems", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography mixed review: physical geography focus", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
        { day: 34, tasks: [
          { subject: "Biology", title: "D4.2 Stability and change", status: "not-started", note: "" },
          { subject: "Business", title: "Business management toolkit", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography full mixed review", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
        { day: 35, tasks: [
          { subject: "Biology", title: "D4.3 Climate change", status: "not-started", note: "" },
          { subject: "Business", title: "Business management toolkit case studies", status: "not-started", note: "" },
          { subject: "Geography", title: "Geography final consolidation", status: "not-started", note: "" },
          { subject: "Free", title: "No math today", status: "not-started", note: "" },
        ]},
      ]}
    ];

    function subjectClass(subject){
      return {
        Biology: "bio",
        Business: "bus",
        Geography: "geo",
        Math: "math",
        Free: "free"
      }[subject] || "free";
    }

    function clonePlan() {
      return JSON.parse(JSON.stringify(plan));
    }

    function loadData(){
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        try { return JSON.parse(saved); } catch(e){}
      }
      return clonePlan();
    }

    let data = loadData();

    function saveData(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateCountdown(){
      const now = new Date();
      let diff = examDate - now;
      if(diff < 0) diff = 0;

      document.getElementById("days").textContent = Math.floor(diff / (1000*60*60*24));
      document.getElementById("hours").textContent = Math.floor((diff / (1000*60*60)) % 24);
      document.getElementById("minutes").textContent = Math.floor((diff / (1000*60)) % 60);
      document.getElementById("seconds").textContent = Math.floor((diff / 1000) % 60);
    }

    function updateStats(){
      const tasks = data.flatMap(w => w.days.flatMap(d => d.tasks)).filter(t => t.subject !== "Free");
      const total = tasks.length;
      const completed = tasks.filter(t => t.status === "complete").length;
      const progress = total ? Math.round((completed / total) * 100) : 0;

      document.getElementById("progressText").textContent = progress + "%";
      document.getElementById("progressCount").textContent = `${completed} / ${total} tasks complete`;
      document.getElementById("progressFill").style.width = `${progress}%`;
    }

    function populateWeekFilter(){
      const weekFilter = document.getElementById("weekFilter");
      weekFilter.innerHTML = `<option value="all">All weeks</option>`;
      data.forEach(w => {
        const option = document.createElement("option");
        option.value = String(w.week);
        option.textContent = `Week ${w.week}`;
        weekFilter.appendChild(option);
      });
    }

    function taskVisible(task){
      const subjectFilter = document.getElementById("subjectFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;

      const subjectOk = subjectFilter === "all" || task.subject === subjectFilter;
      const statusOk = statusFilter === "all" || task.status === statusFilter;
      return subjectOk && statusOk;
    }

    function render(){
      const board = document.getElementById("board");
      const weekFilter = document.getElementById("weekFilter").value;
      board.innerHTML = "";

      data.forEach((weekObj, weekIndex) => {
        if(weekFilter !== "all" && String(weekObj.week) !== weekFilter) return;

        const visibleDays = weekObj.days.filter(dayObj => dayObj.tasks.some(taskVisible));
        if(!visibleDays.length) return;

        const weekEl = document.createElement("section");
        weekEl.className = "week glass";
        weekEl.innerHTML = `
          <div class="week-head">
            <div>
              <div class="week-title">Week ${weekObj.week}</div>
              <div class="week-meta">${visibleDays.length} visible day${visibleDays.length === 1 ? "" : "s"}</div>
            </div>
          </div>
          <div class="days"></div>
        `;

        const daysEl = weekEl.querySelector(".days");

        visibleDays.forEach((dayObj) => {
          const realDayIndex = weekObj.days.findIndex(d => d.day === dayObj.day);

          const dayEl = document.createElement("article");
          dayEl.className = "day";
          dayEl.innerHTML = `
            <h3>Day ${dayObj.day}</h3>
            <small>Week ${weekObj.week}</small>
          `;

          dayObj.tasks.forEach((task, taskIndex) => {
            if(!taskVisible(task)) return;

            const taskEl = document.createElement("div");
            taskEl.className = `task ${task.status}`;

            taskEl.innerHTML = `
              <div class="task-top">
                <span class="subject ${subjectClass(task.subject)}">${task.subject}</span>
                <select class="status ${task.status}">
                  <option value="not-started">Not started</option>
                  <option value="in-progress">In progress</option>
                  <option value="complete">Complete</option>
                </select>
              </div>
              <div class="task-title" contenteditable="true"></div>
              <div class="note" contenteditable="true"></div>
            `;

            const statusSelect = taskEl.querySelector(".status");
            const titleEl = taskEl.querySelector(".task-title");
            const noteEl = taskEl.querySelector(".note");

            statusSelect.value = task.status;
            titleEl.textContent = task.title;
            noteEl.textContent = task.note || "";

            statusSelect.addEventListener("change", () => {
              const newStatus = statusSelect.value;
              data[weekIndex].days[realDayIndex].tasks[taskIndex].status = newStatus;
              saveData();
              render();
            });

            titleEl.addEventListener("input", () => {
              data[weekIndex].days[realDayIndex].tasks[taskIndex].title = titleEl.textContent.trim();
              saveData();
            });

            noteEl.addEventListener("input", () => {
              data[weekIndex].days[realDayIndex].tasks[taskIndex].note = noteEl.textContent.trim();
              saveData();
            });

            dayEl.appendChild(taskEl);
          });

          daysEl.appendChild(dayEl);
        });

        board.appendChild(weekEl);
      });

      updateStats();
    }

    document.getElementById("weekFilter").addEventListener("change", render);
    document.getElementById("subjectFilter").addEventListener("change", render);
    document.getElementById("statusFilter").addEventListener("change", render);

    document.getElementById("expandAll").addEventListener("click", () => {
      document.getElementById("weekFilter").value = "all";
      document.getElementById("subjectFilter").value = "all";
      document.getElementById("statusFilter").value = "all";
      render();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "study-planner-progress.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("resetData").addEventListener("click", () => {
      if(confirm("Reset all progress and edits?")){
        localStorage.removeItem(STORAGE_KEY);
        data = clonePlan();
        render();
      }
    });

    populateWeekFilter();
    updateCountdown();
    setInterval(updateCountdown, 1000);
    render();
  </script>
</body>
